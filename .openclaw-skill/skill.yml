name: ppt-generator
description: 根据文稿内容自动生成PPT演示文稿。支持文件输入、直接文本传入、飞书文档读取。内置QuintenStyle公司模板。
version: 2.0.0
author: OpenClaw PPT Tool
repository: https://github.com/YOUR_USERNAME/openclaw-ppt-tool

# 技能入口脚本
main: ../generate_ppt.sh

# 支持的参数
parameters:
  - name: input
    description: 输入文稿文件路径 (Markdown或纯文本)
    required: false
    type: string

  - name: content
    description: 直接传入文稿内容(无需文件)
    required: false
    type: string

  - name: feishu_doc
    description: 飞书文档URL或ID
    required: false
    type: string

  - name: output
    description: 输出PPT文件路径 (.pptx)
    required: true
    type: string

  - name: background
    description: 背景图片路径 (可选)
    required: false
    type: string

  - name: config
    description: JSON配置文件路径,可使用examples/quinten_config.json
    required: false
    type: string

  - name: css
    description: CSS样式文件路径,可使用examples/quinten_style.css
    required: false
    type: string

  - name: toc
    description: 自动生成目录页
    required: false
    type: boolean
    default: false

  - name: footer
    description: 页脚文本
    required: false
    type: string

  - name: smart_paginate
    description: 启用智能分页
    required: false
    type: boolean
    default: false

# 使用示例
examples:
  - description: "从文件生成"
    command: "--input content.md --output presentation.pptx"

  - description: "直接传入内容"
    command: "--content '# 标题\n\n- 要点1\n- 要点2' --output out.pptx"

  - description: "从飞书文档"
    command: "--feishu-doc https://xxx.feishu.cn/docx/xxx --output out.pptx"

  - description: "使用QuintenStyle模板"
    command: "--input content.md --output out.pptx --css examples/quinten_style.css"

  - description: "完整示例"
    command: "--content '# 报告' --output out.pptx --toc --footer '公司名' --smart-paginate"

# 依赖说明
dependencies:
  - python3
  - python-pptx
  - Pillow
  - requests (可选,用于飞书集成)

# 安装说明
install_instructions: |
  1. 克隆仓库: git clone https://github.com/YOUR_USERNAME/openclaw-ppt-tool.git
  2. 安装依赖: cd openclaw-ppt-tool && pip install -r requirements.txt
  3. (可选)飞书集成: pip install requests
  4. 测试: python main.py -i examples/sample_content.md -o output/test.pptx

# 标签
tags:
  - ppt
  - presentation
  - document
  - generator
  - quintenstyle
  - feishu
