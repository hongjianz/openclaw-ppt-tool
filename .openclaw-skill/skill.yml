name: ppt-generator
description: 根据文稿内容自动生成PPT演示文稿,支持Markdown和纯文本格式,可自定义背景模板和样式。内置QuintenStyle公司模板。
version: 1.0.0
author: OpenClaw PPT Tool
repository: https://github.com/YOUR_USERNAME/openclaw-ppt-tool

# 技能入口脚本
main: ../generate_ppt.sh

# 支持的参数
parameters:
  - name: input
    description: 输入文稿文件路径 (Markdown或纯文本)
    required: true
    type: string

  - name: output
    description: 输出PPT文件路径 (.pptx)
    required: true
    type: string

  - name: background
    description: 背景图片路径 (可选)
    required: false
    type: string

  - name: config
    description: JSON配置文件路径 (可选),可使用examples/quinten_config.json
    required: false
    type: string

  - name: css
    description: CSS样式文件路径 (可选),可使用examples/quinten_style.css
    required: false
    type: string

  - name: format
    description: 文稿格式 (markdown/plain/auto)
    required: false
    type: string
    default: auto

  - name: width
    description: 幻灯片宽度(英寸),默认13.333(16:9)
    required: false
    type: number
    default: 13.333

  - name: height
    description: 幻灯片高度(英寸),默认7.5(16:9)
    required: false
    type: number
    default: 7.5

# 使用示例
examples:
  - description: "基本用法"
    command: "--input content.md --output presentation.pptx"

  - description: "使用QuintenStyle模板"
    command: "--input content.md --output presentation.pptx --css examples/quinten_style.css"

  - description: "带背景图"
    command: "--input content.md --output presentation.pptx --background bg.png"

  - description: "使用JSON配置"
    command: "--input content.txt --output out.pptx --config examples/quinten_config.json"

  - description: "自定义尺寸(4:3)"
    command: "--input content.md --output out.pptx --width 10 --height 7.5"

# 依赖说明
dependencies:
  - python3
  - python-pptx
  - Pillow

# 安装说明
install_instructions: |
  1. 克隆仓库: git clone https://github.com/YOUR_USERNAME/openclaw-ppt-tool.git
  2. 安装依赖: cd openclaw-ppt-tool && pip install -r requirements.txt
  3. 测试: python main.py -i examples/sample_content.md -o output/test.pptx

# 标签
tags:
  - ppt
  - presentation
  - document
  - generator
  - quintenstyle
