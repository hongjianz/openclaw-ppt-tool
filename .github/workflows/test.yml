name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Force JavaScript actions to run on Node.js 24
# This is required during the Node.js 20 deprecation transition period
# See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Using latest versions compatible with Node.js 24
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        python test_ppt_tool.py

    - name: Test PPT generation
      run: |
        mkdir -p output
        python main.py -i examples/sample_content.md -o output/test.pptx
        ls -lh output/
